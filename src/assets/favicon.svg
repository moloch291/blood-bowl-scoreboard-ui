<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Fantasy football scoreboard favicon</title>
  <desc id="desc">A distressed BB monogram over a black spiked shield with ivory and blood-red accents.</desc>

  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241A18"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>

    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3E7CF"/>
      <stop offset="0.5" stop-color="#CDBD9F"/>
      <stop offset="1" stop-color="#8F816B"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <clipPath id="shieldClip">
      <path d="M256 30 430 96v142c0 111-64 193-174 244C146 431 82 349 82 238V96Z"/>
    </clipPath>

    <pattern id="scratches" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <path d="M4 2v24M18 8v18M34 0v30" stroke="#FFFFFF" stroke-opacity="0.09" stroke-width="3"/>
    </pattern>
  </defs>

  <!-- Spiked outer crest -->
  <g filter="url(#shadow)">
    <path d="M256 14 286 58 340 42 350 94 405 94 393 146 444 166 414 212 454 250 410 284 438 334 385 348 390 402 337 392 316 442 270 412 230 452 198 406 145 424 136 370 82 366 98 314 50 288 84 246 46 204 94 176 72 126 126 114 130 60 184 72 210 24Z"
          fill="#0B0B0B" stroke="#E7D9BF" stroke-width="14" stroke-linejoin="round"/>

    <path d="M256 30 430 96v142c0 111-64 193-174 244C146 431 82 349 82 238V96Z"
          fill="url(#shield)" stroke="#7A1716" stroke-width="12" stroke-linejoin="round"/>

    <g clip-path="url(#shieldClip)">
      <rect width="512" height="512" fill="url(#scratches)"/>
      <path d="M70 370 438 122M58 424 448 176M110 484 456 244"
            stroke="#7A1716" stroke-width="18" stroke-linecap="round" opacity="0.35"/>
      <path d="M100 138 418 336M82 198 390 396"
            stroke="#B32220" stroke-width="10" stroke-linecap="round" opacity="0.24"/>
    </g>

    <!-- Football seam -->
    <path d="M156 284c28-84 172-84 200 0-28 84-172 84-200 0Z"
          fill="#121010" stroke="#E7D9BF" stroke-width="10"/>
    <path d="M256 240v88M226 258h60M220 278h72M224 298h64"
          stroke="#B32220" stroke-width="9" stroke-linecap="round"/>

    <!-- BB monogram -->
    <g transform="translate(109 111)">
      <path d="M0 0h116c62 0 100 31 100 81 0 31-15 55-42 68 35 13 54 39 54 76 0 58-43 94-111 94H0Zm73 56v69h36c24 0 37-12 37-34 0-23-13-35-38-35Zm0 123v82h43c27 0 41-14 41-40 0-28-14-42-43-42Z"
            fill="url(#metal)" stroke="#0B0B0B" stroke-width="16" stroke-linejoin="round"/>
      <path d="M132 0h116c62 0 100 31 100 81 0 31-15 55-42 68 35 13 54 39 54 76 0 58-43 94-111 94H132Zm73 56v69h36c24 0 37-12 37-34 0-23-13-35-38-35Zm0 123v82h43c27 0 41-14 41-40 0-28-14-42-43-42Z"
            fill="url(#metal)" stroke="#0B0B0B" stroke-width="16" stroke-linejoin="round"/>
    </g>

    <!-- Red accent cuts -->
    <path d="M185 144 166 188M305 132 288 177M339 221 363 250M160 348 188 323"
          stroke="#B32220" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
